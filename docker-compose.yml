# docker-compose.yml
# Orchestrates Redis, FastAPI backend, and React frontend for vn-ai-trader.

version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: vn-trader-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trader-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vn-trader-backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - trader-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vn-trader-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    networks:
      - trader-net

networks:
  trader-net:
    driver: bridge
